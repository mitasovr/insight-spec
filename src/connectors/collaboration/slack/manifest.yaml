version: 6.60.9

type: DeclarativeSource

check:
  type: CheckStream
  stream_names:
    - users

definitions:
  base_error_handler:
    type: CompositeErrorHandler
    error_handlers:
      - type: DefaultErrorHandler
        response_filters:
          - type: HttpResponseFilter
            action: RATE_LIMITED
            http_codes:
              - 429
        backoff_strategies:
          - type: WaitTimeFromHeader
            header: Retry-After
      - type: DefaultErrorHandler
        response_filters:
          - type: HttpResponseFilter
            action: RATE_LIMITED
            http_codes:
              - 503
        backoff_strategies:
          - type: WaitTimeFromHeader
            header: Retry-After
      - type: DefaultErrorHandler
        max_retries: 5
        response_filters:
          - type: HttpResponseFilter
            action: RETRY
            http_codes:
              - 500
              - 502
              - 504
        backoff_strategies:
          - type: ExponentialBackoffStrategy
            factor: 5

  base_requester:
    type: HttpRequester
    url_base: https://slack.com/api/
    authenticator:
      type: BearerAuthenticator
      api_token: "{{ config['bot_token'] }}"
    request_headers:
      Accept: application/json

  slack_paginator:
    type: DefaultPaginator
    page_token_option:
      type: RequestOption
      inject_into: request_parameter
      field_name: cursor
    pagination_strategy:
      type: CursorPagination
      cursor_value: "{{ response.get('response_metadata', {}).get('next_cursor', '') }}"
    stop_condition:
      type: StopCondition
      condition: "{{ not response.get('response_metadata', {}).get('next_cursor') }}"

  streams:
    # ── users ─────────────────────────────────────────────────────────
    # Root stream: Slack user directory from users.list
    # Full refresh — small dataset, no incremental sync needed
    # PRD: cpt-insightspec-fr-slack-user-directory
    users:
      type: DeclarativeStream
      name: users
      retriever:
        type: SimpleRetriever
        decoder:
          type: JsonDecoder
        requester:
          $ref: "#/definitions/base_requester"
          path: users.list
          http_method: GET
          error_handler:
            $ref: "#/definitions/base_error_handler"
          request_parameters:
            limit: "{{ config.get('page_size', 200) }}"
        paginator:
          $ref: "#/definitions/slack_paginator"
        record_selector:
          type: RecordSelector
          extractor:
            type: DpathExtractor
            field_path:
              - members
      primary_key:
        - slack_user_id
      schema_loader:
        type: InlineSchemaLoader
        schema:
          $ref: "#/schemas/users"
      transformations:
        - type: AddFields
          fields:
            - type: AddedFieldDefinition
              path:
                - slack_user_id
              value: "{{ record['id'] }}"
            - type: AddedFieldDefinition
              path:
                - email
              value: "{{ record.get('profile', {}).get('email') }}"
            - type: AddedFieldDefinition
              path:
                - display_name
              value: >-
                {{ record.get('profile', {}).get('display_name')
                or record.get('profile', {}).get('real_name')
                or record.get('name') }}
            - type: AddedFieldDefinition
              path:
                - real_name
              value: "{{ record.get('profile', {}).get('real_name') or record.get('real_name') }}"
        - type: AddFields
          fields:
            - type: AddedFieldDefinition
              path:
                - tenant_id
              value: "{{ config['insight_tenant_id'] }}"
            - type: AddedFieldDefinition
              path:
                - source_instance_id
              value: "{{ config['source_instance_id'] }}"
            - type: AddedFieldDefinition
              path:
                - _airbyte_data_source
              value: insight_slack
            - type: AddedFieldDefinition
              path:
                - _airbyte_collected_at
              value: "{{ now_utc().strftime('%Y-%m-%dT%H:%M:%SZ') }}"

    # ── channels ──────────────────────────────────────────────────────
    # Root stream: Slack channel directory from conversations.list
    # Full refresh — provides authoritative channel_type for message attribution
    # PRD: cpt-insightspec-fr-slack-channel-type-cache
    channels:
      type: DeclarativeStream
      name: channels
      retriever:
        type: SimpleRetriever
        decoder:
          type: JsonDecoder
        requester:
          $ref: "#/definitions/base_requester"
          path: conversations.list
          http_method: GET
          error_handler:
            $ref: "#/definitions/base_error_handler"
          request_parameters:
            types: "{{ config.get('channel_types', 'public_channel,private_channel,mpim,im') }}"
            limit: "{{ config.get('page_size', 200) }}"
            exclude_archived: "true"
        paginator:
          $ref: "#/definitions/slack_paginator"
        record_selector:
          type: RecordSelector
          extractor:
            type: DpathExtractor
            field_path:
              - channels
      primary_key:
        - channel_id
      schema_loader:
        type: InlineSchemaLoader
        schema:
          $ref: "#/schemas/channels"
      transformations:
        - type: AddFields
          fields:
            - type: AddedFieldDefinition
              path:
                - channel_id
              value: "{{ record['id'] }}"
            - type: AddedFieldDefinition
              path:
                - channel_type
              value: >-
                {{ 'im' if record.get('is_im') else
                ('mpim' if record.get('is_mpim') else
                ('private_channel' if record.get('is_private') else
                'public_channel')) }}
        - type: AddFields
          fields:
            - type: AddedFieldDefinition
              path:
                - tenant_id
              value: "{{ config['insight_tenant_id'] }}"
            - type: AddedFieldDefinition
              path:
                - source_instance_id
              value: "{{ config['source_instance_id'] }}"
            - type: AddedFieldDefinition
              path:
                - _airbyte_data_source
              value: insight_slack
            - type: AddedFieldDefinition
              path:
                - _airbyte_collected_at
              value: "{{ now_utc().strftime('%Y-%m-%dT%H:%M:%SZ') }}"

    # ── messages ──────────────────────────────────────────────────────
    # Child stream of channels: raw messages from conversations.history
    # Partitioned by channel_id; incremental via DatetimeBasedCursor on ts
    # PRD: cpt-insightspec-fr-slack-chat-standard
    messages:
      type: DeclarativeStream
      name: messages
      retriever:
        type: SimpleRetriever
        partition_router:
          type: SubstreamPartitionRouter
          parent_stream_configs:
            - type: ParentStreamConfig
              parent_key: channel_id
              partition_field: channel_id
              stream:
                $ref: "#/definitions/streams/channels"
            - type: ParentStreamConfig
              parent_key: channel_type
              partition_field: channel_type
              stream:
                $ref: "#/definitions/streams/channels"
        decoder:
          type: JsonDecoder
        requester:
          $ref: "#/definitions/base_requester"
          path: conversations.history
          http_method: GET
          error_handler:
            $ref: "#/definitions/base_error_handler"
          request_parameters:
            channel: "{{ stream_partition.channel_id }}"
            limit: "{{ config.get('page_size', 200) }}"
        paginator:
          $ref: "#/definitions/slack_paginator"
        record_selector:
          type: RecordSelector
          extractor:
            type: DpathExtractor
            field_path:
              - messages
      incremental_sync:
        type: DatetimeBasedCursor
        cursor_field: ts
        cursor_datetime_formats:
          - "%s.%f"
          - "%s"
        datetime_format: "%s"
        start_datetime:
          type: MinMaxDatetime
          datetime: "{{ config['start_date'] }}"
          datetime_format: "%Y-%m-%d"
        end_datetime:
          type: MinMaxDatetime
          datetime: "{{ now_utc().strftime('%Y-%m-%d') }}"
          datetime_format: "%Y-%m-%d"
        start_time_option:
          type: RequestOption
          field_name: oldest
          inject_into: request_parameter
        end_time_option:
          type: RequestOption
          field_name: latest
          inject_into: request_parameter
        lookback_window: "P{{ config.get('lookback_days', 7) }}D"
        step: "P1D"
        cursor_granularity: "PT1S"
      primary_key:
        - message_key
      schema_loader:
        type: InlineSchemaLoader
        schema:
          $ref: "#/schemas/messages"
      transformations:
        - type: AddFields
          fields:
            - type: AddedFieldDefinition
              path:
                - message_key
              value: "{{ stream_partition.channel_id ~ ':' ~ record['ts'] }}"
            - type: AddedFieldDefinition
              path:
                - channel_id
              value: "{{ stream_partition.channel_id }}"
            - type: AddedFieldDefinition
              path:
                - channel_type
              value: "{{ stream_partition.channel_type }}"
        - type: AddFields
          fields:
            - type: AddedFieldDefinition
              path:
                - tenant_id
              value: "{{ config['insight_tenant_id'] }}"
            - type: AddedFieldDefinition
              path:
                - source_instance_id
              value: "{{ config['source_instance_id'] }}"
            - type: AddedFieldDefinition
              path:
                - _airbyte_data_source
              value: insight_slack
            - type: AddedFieldDefinition
              path:
                - _airbyte_collected_at
              value: "{{ now_utc().strftime('%Y-%m-%dT%H:%M:%SZ') }}"

streams:
  - $ref: "#/definitions/streams/users"
  - $ref: "#/definitions/streams/channels"
  - $ref: "#/definitions/streams/messages"

spec:
  type: Spec
  connection_specification:
    type: object
    $schema: http://json-schema.org/draft-07/schema#
    required:
      - bot_token
      - insight_tenant_id
      - source_instance_id
      - start_date
    properties:
      bot_token:
        type: string
        title: Slack Bot Token
        description: >-
          Slack Bot Token (xoxb-*). Required scopes: channels:history,
          channels:read, groups:history, groups:read, im:history,
          im:read, mpim:history, mpim:read, users:read, users:read.email.
        airbyte_secret: true
        order: 0
      insight_tenant_id:
        type: string
        title: Insight Tenant ID
        description: Insight tenant identifier stamped onto every emitted record.
        order: 1
      source_instance_id:
        type: string
        title: Source Instance ID
        description: >-
          Slack workspace identifier (e.g., slack-acme).
          Disambiguates workspaces in multi-workspace setups.
        order: 2
      start_date:
        type: string
        title: Start Date
        description: >-
          Earliest date to collect messages from on the initial sync.
          Subsequent syncs use the incremental cursor with a 7-day lookback window.
        format: date
        order: 3
      page_size:
        type: integer
        title: Page Size
        description: Records per API page for paginated Slack endpoints.
        default: 200
        minimum: 1
        maximum: 999
        order: 4
      lookback_days:
        type: integer
        title: Lookback Days
        description: >-
          Number of days to look back on each incremental sync run.
          Recommended: 7 for daily runs.
        default: 7
        minimum: 1
        maximum: 30
        order: 5
      channel_types:
        type: string
        title: Channel Types
        description: >-
          Comma-separated channel types to scan.
          Options: public_channel, private_channel, mpim, im.
        default: "public_channel,private_channel,mpim,im"
        order: 6
    additionalProperties: true

metadata:
  assist: {}
  autoImportSchema:
    users: false
    channels: false
    messages: false

schemas:
  users:
    type: object
    $schema: http://json-schema.org/draft-07/schema#
    properties:
      slack_user_id:
        type: string
      email:
        type:
          - string
          - "null"
      display_name:
        type:
          - string
          - "null"
      real_name:
        type:
          - string
          - "null"
      is_admin:
        type:
          - boolean
          - "null"
      is_owner:
        type:
          - boolean
          - "null"
      is_restricted:
        type:
          - boolean
          - "null"
      is_ultra_restricted:
        type:
          - boolean
          - "null"
      is_bot:
        type:
          - boolean
          - "null"
      deleted:
        type:
          - boolean
          - "null"
      tz:
        type:
          - string
          - "null"
      updated:
        type:
          - integer
          - "null"
      tenant_id:
        type:
          - string
          - "null"
      source_instance_id:
        type:
          - string
          - "null"
      _airbyte_data_source:
        type:
          - string
          - "null"
      _airbyte_collected_at:
        type:
          - string
          - "null"
        format: date-time
    additionalProperties: true
  channels:
    type: object
    $schema: http://json-schema.org/draft-07/schema#
    properties:
      channel_id:
        type: string
      name:
        type:
          - string
          - "null"
      is_channel:
        type:
          - boolean
          - "null"
      is_group:
        type:
          - boolean
          - "null"
      is_im:
        type:
          - boolean
          - "null"
      is_mpim:
        type:
          - boolean
          - "null"
      is_private:
        type:
          - boolean
          - "null"
      is_archived:
        type:
          - boolean
          - "null"
      num_members:
        type:
          - integer
          - "null"
      created:
        type:
          - integer
          - "null"
      creator:
        type:
          - string
          - "null"
      channel_type:
        type:
          - string
          - "null"
      tenant_id:
        type:
          - string
          - "null"
      source_instance_id:
        type:
          - string
          - "null"
      _airbyte_data_source:
        type:
          - string
          - "null"
      _airbyte_collected_at:
        type:
          - string
          - "null"
        format: date-time
    additionalProperties: true
  messages:
    type: object
    $schema: http://json-schema.org/draft-07/schema#
    properties:
      message_key:
        type: string
      channel_id:
        type:
          - string
          - "null"
      channel_type:
        type:
          - string
          - "null"
      ts:
        type:
          - string
          - "null"
      user:
        type:
          - string
          - "null"
      type:
        type:
          - string
          - "null"
      subtype:
        type:
          - string
          - "null"
      thread_ts:
        type:
          - string
          - "null"
      reply_count:
        type:
          - integer
          - "null"
      reply_users_count:
        type:
          - integer
          - "null"
      tenant_id:
        type:
          - string
          - "null"
      source_instance_id:
        type:
          - string
          - "null"
      _airbyte_data_source:
        type:
          - string
          - "null"
      _airbyte_collected_at:
        type:
          - string
          - "null"
        format: date-time
    additionalProperties: true
