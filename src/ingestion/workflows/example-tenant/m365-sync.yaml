# Generic sync CronWorkflow template
# Variables resolved by sync-flows.sh from descriptor.yaml + terraform output:
#   CONNECTOR, TENANT_ID, CONNECTION_ID, SCHEDULE, DBT_SELECT

apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: m365-sync
  namespace: argo
  labels:
    app.kubernetes.io/part-of: ingestion
    tenant: "example-tenant"
    connector: "m365"
spec:
  schedules:
    - "0 2 * * *"
  timezone: UTC
  concurrencyPolicy: Replace
  startingDeadlineSeconds: 600
  workflowSpec:
    entrypoint: run
    templates:
      - name: run
        steps:
          - - name: pipeline
              templateRef:
                name: ingestion-pipeline
                template: pipeline
              arguments:
                parameters:
                  - name: connection_id
                    value: "20071cb0-9945-4f81-9cd8-684bdbf7fde4"
                  - name: dbt_select
                    value: "tag:silver"
