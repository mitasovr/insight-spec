apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: dbt-run
  namespace: argo
  labels:
    app.kubernetes.io/part-of: ingestion
spec:
  entrypoint: run
  templates:
    - name: run
      inputs:
        parameters:
          - name: dbt_select
            default: "tag:silver"
          - name: toolbox_image
            default: "ghcr.io/cyberfabric/insight-toolbox:latest"
          - name: clickhouse_host
            default: "clickhouse.data.svc.cluster.local"
          - name: clickhouse_port
            default: "8123"
          - name: full_refresh
            default: ""
      activeDeadlineSeconds: 1800
      script:
        image: "{{inputs.parameters.toolbox_image}}"
        imagePullPolicy: Always
        command: [bash]
        env:
          - name: CLICKHOUSE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: clickhouse-credentials
                key: password
        source: |
          set -euo pipefail

          # full_refresh is a bare-interpolated token in the dbt line below.
          # Constrain it to a closed allow-list so an upstream caller cannot
          # smuggle arbitrary shell tokens via the workflow parameter.
          FULL_REFRESH_ARG=""
          case "{{inputs.parameters.full_refresh}}" in
            ""|"--full-refresh")
              FULL_REFRESH_ARG="{{inputs.parameters.full_refresh}}"
              ;;
            *)
              echo "ERROR: full_refresh must be empty or '--full-refresh'; got: {{inputs.parameters.full_refresh}}" >&2
              exit 1
              ;;
          esac

          cd /ingestion/dbt
          CH_PASS="${CLICKHOUSE_PASSWORD}"
          cat > profiles.yml <<PROFILES
          ingestion:
            target: k8s
            outputs:
              k8s:
                type: clickhouse
                host: "{{inputs.parameters.clickhouse_host}}"
                port: {{inputs.parameters.clickhouse_port}}
                schema: silver
                user: default
                password: "${CH_PASS}"
                secure: false
                send_receive_timeout: 1500
                query_limit: 0
                connect_timeout: 30
          PROFILES
          dbt run --profiles-dir . --select "{{inputs.parameters.dbt_select}}" ${FULL_REFRESH_ARG}
