apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: ingestion-pipeline
  namespace: argo
  labels:
    app.kubernetes.io/part-of: ingestion
spec:
  entrypoint: pipeline
  templates:
    - name: pipeline
      inputs:
        parameters:
          - name: connection_id
          - name: dbt_select
            default: "tag:silver"
          - name: toolbox_image
            default: "ghcr.io/cyberfabric/insight-toolbox:latest"
          - name: airbyte_url
            default: "http://airbyte-airbyte-server-svc.airbyte.svc.cluster.local:8001"
          - name: clickhouse_host
            default: "clickhouse.data.svc.cluster.local"
          - name: clickhouse_port
            default: "8123"
      dag:
        tasks:
          - name: sync
            templateRef:
              name: airbyte-sync
              template: sync
            arguments:
              parameters:
                - name: connection_id
                  value: "{{inputs.parameters.connection_id}}"
                - name: airbyte_url
                  value: "{{inputs.parameters.airbyte_url}}"
          - name: transform
            depends: sync
            templateRef:
              name: dbt-run
              template: run
            arguments:
              parameters:
                - name: dbt_select
                  value: "{{inputs.parameters.dbt_select}}"
                - name: toolbox_image
                  value: "{{inputs.parameters.toolbox_image}}"
                - name: clickhouse_host
                  value: "{{inputs.parameters.clickhouse_host}}"
                - name: clickhouse_port
                  value: "{{inputs.parameters.clickhouse_port}}"
