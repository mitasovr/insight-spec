apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: transform-jira
  namespace: argo
  labels:
    app.kubernetes.io/part-of: ingestion
spec:
  entrypoint: run
  templates:
    - name: run
      # Jira-specific transform path: rust enrich runs between staging-dbt
      # and silver-dbt to populate staging.jira__task_field_history before
      # silver class_task_* models can union it.
      #
      # DAG: dbt(tag:jira) → tt-enrich-jira-run → dbt(tag:silver,tag:jira+)
      #
      # The silver selector intersects `tag:silver` with `tag:jira+` so we
      # rebuild only silver models downstream of jira (class_task_*),
      # not the full silver layer.
      inputs:
        parameters:
          - name: connector
          - name: insight_source_id
            default: ""
          - name: toolbox_image
            default: "ghcr.io/cyberfabric/insight-toolbox:latest"
          - name: clickhouse_host
            default: "clickhouse.data.svc.cluster.local"
          - name: clickhouse_port
            default: "8123"
      dag:
        tasks:
          - name: staging
            templateRef:
              name: dbt-run
              template: run
            arguments:
              parameters:
                - name: dbt_select
                  value: "tag:{{inputs.parameters.connector}}"
                - name: toolbox_image
                  value: "{{inputs.parameters.toolbox_image}}"
                - name: clickhouse_host
                  value: "{{inputs.parameters.clickhouse_host}}"
                - name: clickhouse_port
                  value: "{{inputs.parameters.clickhouse_port}}"

          - name: enrich
            depends: staging
            templateRef:
              name: tt-enrich-jira-run
              template: run
            arguments:
              parameters:
                - name: insight_source_id
                  value: "{{inputs.parameters.insight_source_id}}"
                - name: clickhouse_host
                  value: "{{inputs.parameters.clickhouse_host}}"
                - name: clickhouse_port
                  value: "{{inputs.parameters.clickhouse_port}}"

          - name: silver
            depends: enrich
            templateRef:
              name: dbt-run
              template: run
            arguments:
              parameters:
                - name: dbt_select
                  value: "tag:silver,tag:{{inputs.parameters.connector}}+"
                - name: toolbox_image
                  value: "{{inputs.parameters.toolbox_image}}"
                - name: clickhouse_host
                  value: "{{inputs.parameters.clickhouse_host}}"
                - name: clickhouse_port
                  value: "{{inputs.parameters.clickhouse_port}}"
