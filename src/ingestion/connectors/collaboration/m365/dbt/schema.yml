version: 2

sources:
  - name: bronze_m365
    schema: bronze_m365
    tables:
      - name: email_activity
      - name: teams_activity
      - name: onedrive_activity
      - name: sharepoint_activity

models:
  - name: m365__comms_events
    description: "M365 communication events → staging, feeds class_comms_events"
    columns:
      - name: tenant_id
        tests:
          - not_null
      - name: source_id
        tests:
          - not_null
      - name: unique_key
        tests:
          - not_null
          - unique
      - name: user_email
        description: "User principal name from M365"
      - name: activity_date
        tests:
          - not_null

  - name: m365__collab_chat_activity
    description: "M365 Teams chat activity → staging, feeds class_collab_chat_activity"
    columns:
      - name: tenant_id
        tests:
          - not_null
      - name: insight_source_id
        tests:
          - not_null
      - name: unique_key
        tests:
          - not_null
          - unique
      - name: person_key
        tests:
          - not_null
      - name: date
        tests:
          - not_null

  - name: m365__collab_meeting_activity
    description: "M365 Teams meeting activity → staging, feeds class_collab_meeting_activity"
    columns:
      - name: tenant_id
        tests:
          - not_null
      - name: insight_source_id
        tests:
          - not_null
      - name: unique_key
        tests:
          - not_null
          - unique
      - name: person_key
        tests:
          - not_null
      - name: date
        tests:
          - not_null

  - name: m365__collab_email_activity
    description: "M365 Outlook email activity → staging, feeds class_collab_email_activity"
    columns:
      - name: tenant_id
        tests:
          - not_null
      - name: insight_source_id
        tests:
          - not_null
      - name: unique_key
        tests:
          - not_null
          - unique
      - name: person_key
        tests:
          - not_null
      - name: date
        tests:
          - not_null

  - name: m365__collab_document_activity_onedrive
    description: "M365 OneDrive document activity → staging, unioned into class_collab_document_activity"
    columns:
      - name: tenant_id
        tests:
          - not_null
      - name: insight_source_id
        tests:
          - not_null
      - name: unique_key
        tests:
          - not_null
          - unique
      - name: person_key
        tests:
          - not_null
      - name: date
        tests:
          - not_null
      - name: product
        tests:
          - not_null
          - accepted_values:
              values: ['onedrive']

  - name: m365__collab_document_activity_sharepoint
    description: "M365 SharePoint document activity → staging, unioned into class_collab_document_activity"
    columns:
      - name: tenant_id
        tests:
          - not_null
      - name: insight_source_id
        tests:
          - not_null
      - name: unique_key
        tests:
          - not_null
          - unique
      - name: person_key
        tests:
          - not_null
      - name: date
        tests:
          - not_null
      - name: product
        tests:
          - not_null
          - accepted_values:
              values: ['sharepoint']
