name: m365
version: "1.0"
type: nocode

# Orchestration
schedule: "0 2 * * *"
dbt_select: "+tag:silver"
workflow: sync

# Connection config — streams to sync
connection:
  namespace: "bronze_${tenant_id}"
  streams:
    - name: email_activity
      sync_mode: incremental_append
    - name: teams_activity
      sync_mode: incremental_append
    - name: onedrive_activity
      sync_mode: incremental_append
    - name: sharepoint_activity
      sync_mode: incremental_append

# Silver targets produced by dbt
silver_targets:
  - class_comms_events
