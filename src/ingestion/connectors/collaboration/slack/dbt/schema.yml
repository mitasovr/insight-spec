version: 2

sources:
  - name: bronze_slack
    schema: bronze_slack
    tables:
      - name: users_details

models:
  - name: slack__users_latest
    description: "Deduplicated (user_id, email) view over Slack analytics member snapshots — latest row per pair with non-null email."
    columns:
      - name: tenant_id
        tests:
          - not_null
      - name: source_id
        tests:
          - not_null
      - name: user_id
        tests:
          - not_null
      - name: email
        tests:
          - not_null
      - name: unique_key
        tests:
          - not_null
          - unique

  - name: slack__users_snapshot
    description: "Slack users SCD2 snapshot — tracks email, is_guest, is_billable_seat changes over time."
    columns:
      - name: tenant_id
        tests:
          - not_null
      - name: source_id
        tests:
          - not_null
      - name: unique_key
        tests:
          - not_null

  - name: slack__users_fields_history
    description: "Slack users field-level change history (email, is_guest, is_billable_seat)."
    columns:
      - name: tenant_id
        tests:
          - not_null
      - name: source_id
        tests:
          - not_null

  - name: slack__collab_chat_activity
    description: "Slack daily chat activity per user (admin.analytics.getFile). Feeds silver.class_collab_chat_activity."
    columns:
      - name: tenant_id
        tests:
          - not_null
      - name: insight_source_id
        tests:
          - not_null
      - name: unique_key
        tests:
          - not_null
          - unique
      - name: person_key
        tests:
          - not_null
      - name: date
        tests:
          - not_null
      - name: data_source
        tests:
          - not_null
