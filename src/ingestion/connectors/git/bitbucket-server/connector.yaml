              partition_field: "repo_slug"
              stream:
                $ref: "#/definitions/repositories_stream"
    incremental_sync:
      type: DatetimeBasedCursor
      cursor_field: "updatedDate"
      cursor_datetime_formats:
        - "%ms"
      datetime_format: "%ms"
