# Bitbucket Server Connector — Airbyte Declarative Manifest
# Extracts: projects, repos, branches, commits, pull requests, permissions, settings
# Auth: Basic Auth (username + password/PAT)
# Sync: full refresh (most streams), incremental (pull_requests on updatedDate)

version: "6.44.0"

definitions:
  # --- Shared components ---

  base_requester:
    type: HttpRequester
    url_base: "{{ config['base_url'] }}/"
    http_method: GET
    authenticator:
      type: BasicHttpAuthenticator
      username: "{{ config['username'] }}"
      password: "{{ config['password'] }}"
    request_headers:
      Accept: "application/json"
    error_handler:
      type: CompositeErrorHandler
      error_handlers:
        - type: DefaultErrorHandler
          response_filters:
            - type: HttpResponseFilter
              http_codes: [429]
              action: RATE_LIMITED
          backoff_strategies:
            - type: WaitTimeFromHeader
              header: "Retry-After"
            - type: ExponentialBackoffStrategy
              factor: 5
        - type: DefaultErrorHandler
          response_filters:
            - type: HttpResponseFilter
              http_codes: [503]
              action: RATE_LIMITED
          backoff_strategies:
            - type: WaitTimeFromHeader
              header: "Retry-After"
            - type: ExponentialBackoffStrategy
              factor: 5
        - type: DefaultErrorHandler
          response_filters:
            - type: HttpResponseFilter
              http_codes: [500, 502, 504]
              action: RETRY
          backoff_strategies:
            - type: ExponentialBackoffStrategy
              factor: 5
          max_retries: 5

  bitbucket_paginator:
    type: DefaultPaginator
    page_token_option:
      type: RequestOption
      inject_into: request_parameter
      field_name: "start"
    page_size_option:
      type: RequestOption
      inject_into: request_parameter
      field_name: "limit"
    pagination_strategy:
      type: CursorPagination
      cursor_value: "{{ response.get('nextPageStart', '') }}"
      stop_condition: "{{ response.get('isLastPage', true) }}"
      page_size: 25

  bitbucket_record_selector:
    type: RecordSelector
    extractor:
      type: DpathExtractor
      field_path:
        - values

  single_object_record_selector:
    type: RecordSelector
    extractor:
      type: DpathExtractor
      field_path: []

  standard_transformations:
    - type: AddFields
      fields:
        - path: [tenant_id]
          value: "{{ config['tenant_id'] }}"
        - path: [source_instance_id]
          value: "bitbucket-{{ config['instance_name'] }}"
        - path: [_source]
          value: "bitbucket_server"
        - path: [_extracted_at]
          value: "{{ now_utc().strftime('%Y-%m-%dT%H:%M:%SZ') }}"

  # ===================================================================
  # TIER 1 — Core streams
  # ===================================================================

  # 1. projects
  projects_stream:
    type: DeclarativeStream
    name: "projects"
    primary_key: "key"
    retriever:
      type: SimpleRetriever
      requester:
        $ref: "#/definitions/base_requester"
        path: "rest/api/1.0/projects"
      record_selector:
        $ref: "#/definitions/bitbucket_record_selector"
      paginator:
        $ref: "#/definitions/bitbucket_paginator"
    transformations:
      - type: AddFields
        fields:
          - path: [insight_tenant_id]
            value: "{{ config['tenant_id'] }}"
          - path: [insight_source_id]
            value: "{{ config['insight_source_id'] }}"
          - path: [source_instance_id]
            value: "bitbucket-{{ config['instance_name'] }}"
          - path: [_source]
            value: "bitbucket_server"
          - path: [_extracted_at]
            value: "{{ now_utc().strftime('%Y-%m-%dT%H:%M:%SZ') }}"
    schema_loader:
      type: InlineSchemaLoader
      schema:
        $schema: "http://json-schema.org/draft-07/schema#"
        type: object
        additionalProperties: true
        properties:
          insight_tenant_id:
            type: string
          insight_source_id:
            type: string
          source_instance_id:
            type: string
          key:
            type: string
          id:
            type:
              - "null"
              - integer
          name:
            type:
              - "null"
              - string
          description:
            type:
              - "null"
              - string
          public:
            type:
              - "null"
              - boolean
          type:
            type:
              - "null"
              - string
          _source:
            type: string
          _extracted_at:
            type: string
            format: date-time

  # 2. repositories
  repositories_stream:
