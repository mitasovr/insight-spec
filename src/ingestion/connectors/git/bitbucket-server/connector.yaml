check:
  type: CheckStream
  stream_names:
    - "projects"

spec:
  type: Spec
  documentation_url: "https://developer.atlassian.com/server/bitbucket/reference/rest-api/"
  connection_specification:
    $schema: "http://json-schema.org/draft-07/schema#"
    title: "Bitbucket Server Source"
    type: object
    required:
      - "tenant_id"
      - "insight_source_id"
      - "base_url"
      - "username"
      - "password"
      - "instance_name"
    additionalProperties: true
    properties:
      tenant_id:
        type: string
        title: "Tenant ID"
        description: "Tenant isolation identifier (UUID)."
        order: 0
      insight_source_id:
        type: string
        title: "Source ID"
        description: "Unique identifier for this data source within the tenant (e.g., 'bitbucket-prod-eu')."
        examples:
          - "bitbucket-prod-eu"
          - "bitbucket-dev"
        order: 1
      base_url:
        type: string
        title: "Base URL"
        description: "Bitbucket Server base URL (e.g., https://git.company.com). Do not include trailing slash."
        examples:
          - "https://git.company.com"
        order: 1
      username:
        type: string
        title: "Username"
        description: "Bitbucket Server username for authentication."
        order: 2
      password:
        type: string
        title: "Password / Personal Access Token"
        description: "Password or Personal Access Token for authentication."
        airbyte_secret: true
        order: 3
      instance_name:
        type: string
        title: "Instance Name"
        description: "Connector instance identifier used in source_instance_id (e.g., 'prod', 'staging')."
        examples:
          - "prod"
          - "staging"
        order: 4
      project_keys:
        type: array
        items:
          type: string
        title: "Project Keys"
        description: "Optional list of project keys to filter. Leave empty to sync all projects."
