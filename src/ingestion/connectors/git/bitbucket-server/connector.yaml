  - $ref: "#/definitions/pr_commits_stream"
  - $ref: "#/definitions/pr_changes_stream"
  - $ref: "#/definitions/commit_changes_stream"
  - $ref: "#/definitions/build_statuses_stream"
  - $ref: "#/definitions/pr_merge_eligibility_stream"
