# Connector package descriptor
name: bitbucket-server
version: "1.0"
type: nocode

# Silver layer targets this connector populates (via dbt)
silver_targets:
  - git_repositories
  - git_commits
  - git_commit_files
  - git_pull_requests
  - git_pr_reviews
  - git_pr_comments
  - git_repository_branches
  - git_users
  - git_tags

# Stream definitions mapping to Bronze tables
streams:
  # Tier 1 — Core
  - name: projects
    bronze_table: projects
    primary_key: [key]
  - name: repositories
    bronze_table: repositories
    primary_key: [project_key, slug]
  - name: branches
    bronze_table: branches
    primary_key: [project_key, repo_slug, id]
  - name: commits
    bronze_table: commits
    primary_key: [project_key, repo_slug, id]
  - name: pull_requests
    bronze_table: pull_requests
    primary_key: [project_key, repo_slug, id]
    cursor_field: updatedDate
  - name: pr_activities
    bronze_table: pr_activities
    primary_key: [project_key, repo_slug, pr_id, id]
  - name: users
    bronze_table: users
    primary_key: [id]

  # Tier 2 — Extended
  - name: tags
    bronze_table: tags
    primary_key: [project_key, repo_slug, id]
  - name: pr_commits
    bronze_table: pr_commits
    primary_key: [project_key, repo_slug, pr_id, id]
  - name: pr_changes
    bronze_table: pr_changes
    primary_key: [project_key, repo_slug, pr_id]
  - name: commit_changes
    bronze_table: commit_changes
    primary_key: [project_key, repo_slug, commit_id]
  - name: build_statuses
    bronze_table: build_statuses
    primary_key: [commit_id, key]
  - name: pr_merge_eligibility
    bronze_table: pr_merge_eligibility
    primary_key: [project_key, repo_slug, pr_id]

  # Tier 3 — Metadata & Admin
  - name: groups
    bronze_table: groups
    primary_key: [name]
  - name: group_members
    bronze_table: group_members
    primary_key: [group_name, name]
  - name: project_permissions_users
    bronze_table: project_permissions_users
    primary_key: [project_key, user_name]
  - name: project_permissions_groups
    bronze_table: project_permissions_groups
    primary_key: [project_key, group_name]
  - name: repo_permissions_users
    bronze_table: repo_permissions_users
    primary_key: [project_key, repo_slug, user_name]
  - name: repo_permissions_groups
    bronze_table: repo_permissions_groups
    primary_key: [project_key, repo_slug, group_name]
  - name: global_permissions_users
    bronze_table: global_permissions_users
    primary_key: [user_name]
  - name: global_permissions_groups
    bronze_table: global_permissions_groups
    primary_key: [group_name]
  - name: webhooks
    bronze_table: webhooks
    primary_key: [project_key, repo_slug, id]
  - name: branch_restrictions
    bronze_table: branch_restrictions
    primary_key: [project_key, repo_slug, id]
  - name: repo_hooks
    bronze_table: repo_hooks
    primary_key: [project_key, repo_slug, hook_key]
  - name: pr_merge_config
    bronze_table: pr_merge_config
    primary_key: [project_key, repo_slug]
  - name: branch_model
    bronze_table: branch_model
    primary_key: [project_key, repo_slug]
  - name: application_properties
    bronze_table: application_properties
    primary_key: [version]
