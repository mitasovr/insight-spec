version: 2

sources:
  - name: bronze_cursor
    schema: bronze_cursor
    tables:
      - name: cursor_members
      - name: cursor_audit_logs
      - name: cursor_usage_events
      - name: cursor_usage_events_daily_resync
      - name: cursor_daily_usage

models:
  - name: cursor__ai_dev_usage
    description: >
      Unified AI dev tool usage events from Cursor.
      Deduplication: yesterday and earlier from daily_resync (finalized costs),
      today from hourly stream (near-real-time).
    columns:
      - name: tenant_id
        description: "Tenant isolation field — framework-injected"
        tests:
          - not_null
      - name: source_id
        description: "Connector instance identifier — framework-injected"
        tests:
          - not_null
      - name: unique_key
        description: "Composite dedup key: tenant_id-source_id-userEmail-timestamp (usage events) or tenant_id-source_id-id (members)"
        tests:
          - not_null
          - unique
      - name: user_email
        description: "User email (identity key for Silver step 2 resolution)"
        tests:
          - not_null
      - name: event_timestamp
        description: "Event timestamp (epoch ms as string)"
        tests:
          - not_null
      - name: event_kind
        description: "Event type: chat, completion, agent, cmd-k, etc."
      - name: model
        description: "AI model used (e.g. gpt-4o, claude-3.5-sonnet)"
      - name: request_cost
        description: "Request cost in credits"
      - name: platform_fee
        description: "Cursor platform fee"
      - name: is_token_based
        description: "Billed by tokens (true) vs per-request (false)"
      - name: is_free_bugbot
        description: "Free Bug Bot invocation"
      - name: max_mode
        description: "Premium model tier enabled"
      - name: input_tokens
        description: "Tokens in prompt (from tokenUsage, nullable)"
      - name: output_tokens
        description: "Tokens in response (from tokenUsage, nullable)"
      - name: cache_read_tokens
        description: "Tokens served from cache (from tokenUsage, nullable)"
      - name: cache_write_tokens
        description: "Tokens written to cache (from tokenUsage, nullable)"
      - name: total_cents
        description: "Total cost in cents (from tokenUsage, nullable)"
      - name: source
        description: "Always 'cursor' — source discriminator for cross-tool queries"
        tests:
          - not_null
          - accepted_values:
              values: ['cursor']

  - name: cursor__members_snapshot
    description: >
      SCD2 snapshot of Cursor team members. Appends a new row when
      name, role, or isRemoved changes.
    columns:
      - name: tenant_id
        tests:
          - not_null
      - name: source_id
        tests:
          - not_null
      - name: unique_key
        tests:
          - not_null
      - name: email
        description: "Member email — identity key"
        tests:
          - not_null
      - name: name
        description: "Display name"
      - name: role
        description: "Team role (owner, admin, member)"
      - name: isRemoved
        description: "Whether the member has been removed"
      - name: _row_hash
        description: "cityHash64 of tracked columns"
      - name: _tracked_at
        description: "Timestamp when this version was captured"

  - name: cursor__members_history
    description: >
      Field-level change log for Cursor team members.
      One row per changed field per version transition.
    columns:
      - name: entity_id
        description: "Member ID (stable identifier)"
        tests:
          - not_null
      - name: tenant_id
        tests:
          - not_null
      - name: source_id
        tests:
          - not_null
      - name: field_name
        description: "Changed field: name, role, or isRemoved"
        tests:
          - not_null
      - name: old_value
        description: "Previous value (empty string for first version)"
      - name: new_value
        description: "New value"
      - name: updated_at
        description: "When the change was detected"
        tests:
          - not_null
