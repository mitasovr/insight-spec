version: 2

sources:
  - name: bamboohr
    schema: bronze_bamboohr
    tables:
      - name: employees
      - name: leave_requests
      - name: meta_fields

models:
  - name: to_class_people
    description: >
      BambooHR Employees -> class_people (Silver Step 1).
      Full-refresh source. Identity key: email (workEmail).
      Maps BambooHR status to normalised status (active/on_leave/terminated).
      SCD Type 2 fields (valid_from/valid_to) are set as current-state snapshot
      (valid_from = lastChanged, valid_to = NULL).
    columns:
      - name: tenant_id
        description: "Tenant isolation identifier"
        tests:
          - not_null
      - name: source_id
        description: "Connector instance identifier"
        tests:
          - not_null
      - name: unique_key
        description: "Composite dedup key"
        tests:
          - not_null
      - name: source_person_id
        description: "BambooHR employee ID"
        tests:
          - not_null
      - name: email
        description: "Work email — identity key for Silver Step 2"
      - name: display_name
        description: "Full display name"
      - name: first_name
        description: "First name"
      - name: last_name
        description: "Last name"
      - name: status
        description: "Normalised: active, on_leave, terminated"
        tests:
          - accepted_values:
              arguments:
                values: ['active', 'on_leave', 'terminated']
      - name: source
        description: "Always 'bamboohr'"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['bamboohr']
      - name: workspace_id
        description: "Tenant identifier"
        tests:
          - not_null

  - name: bamboohr__employees_snapshot
    description: >
      SCD2 append-only snapshot of BambooHR employees.
      Tracks changes in standard fields and custom fields from raw_data.
      Custom fields list is passed via dbt var bamboohr_custom_fields.
    columns:
      - name: unique_key
        tests:
          - not_null
      - name: _row_hash
        description: "cityHash64 of tracked columns for change detection"
      - name: _tracked_at
        description: "Timestamp when this version was captured"

  - name: bamboohr__employees_fields_history
    description: >
      Field-level change log for BambooHR employees.
      One row per changed field per version transition.
      Includes both standard and custom fields (from raw_data).
    columns:
      - name: entity_id
        description: "BambooHR employee ID"
        tests:
          - not_null
      - name: tenant_id
        tests:
          - not_null
      - name: source_id
        tests:
          - not_null
      - name: field_name
        description: "Name of the changed field"
        tests:
          - not_null
      - name: old_value
        description: "Previous value (as string)"
      - name: new_value
        description: "New value (as string)"
      - name: updated_at
        description: "Timestamp of the change"
        tests:
          - not_null
