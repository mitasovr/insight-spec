version: 2

sources:
  - name: salesforce
    schema: bronze_salesforce
    tables:
      - name: accounts
      - name: contacts
      - name: opportunities
      - name: opportunity_history
      - name: tasks
      - name: events
      - name: users

models:
  - name: to_crm_users
    description: >
      Salesforce Users -> crm_users (Silver Step 1).
      Full-refresh source — no incremental logic.
      Identity key: email (resolved to person_id in Silver Step 2).
    columns:
      - name: user_id
        description: "Salesforce 18-char User ID"
        tests:
          - not_null
      - name: email
        description: "User email — identity key for Silver Step 2"
        tests:
          - not_null
      - name: first_name
        description: "First name"
      - name: last_name
        description: "Last name"
      - name: title
        description: "Job title"
      - name: department
        description: "Department (Salesforce-specific)"
      - name: is_active
        description: "1 if active, 0 if deactivated"
        tests:
          - not_null
      - name: metadata
        description: "JSON with Username, ProfileId, UserRoleId, IsDeleted"
      - name: collected_at
        description: "When the record was collected"
      - name: data_source
        description: "Always 'salesforce'"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['salesforce']
      - name: _version
        description: "SystemModstamp as millisecond timestamp for deduplication"
        tests:
          - not_null

  - name: to_crm_deals
    description: >
      Salesforce Opportunities -> crm_deals (Silver Step 1).
      Incremental via SystemModstamp. IsClosed/IsWon are native Salesforce fields.
      ForecastCategory mapped to pipeline.
    columns:
      - name: deal_id
        description: "Salesforce 18-char Opportunity ID"
        tests:
          - not_null
      - name: name
        description: "Opportunity name"
      - name: pipeline
        description: "ForecastCategory (nullable)"
      - name: stage
        description: "StageName — raw source value"
      - name: amount
        description: "Deal amount (nullable)"
      - name: close_date
        description: "Expected or actual close date"
      - name: owner_id
        description: "Salesperson ID — joins to crm_users.user_id"
        tests:
          - not_null
      - name: account_id
        description: "Associated account ID"
      - name: is_closed
        description: "1 if closed (native Salesforce field)"
      - name: is_won
        description: "1 if won (native Salesforce field)"
      - name: lead_source
        description: "Lead origin"
      - name: probability
        description: "Win probability 0-100"
      - name: metadata
        description: "JSON with Type, CurrencyIsoCode, IsDeleted"
      - name: custom_str_attrs
        description: "Empty Map — custom field promotion deferred"
      - name: custom_num_attrs
        description: "Empty Map — custom field promotion deferred"
      - name: created_at
        description: "Opportunity creation timestamp"
      - name: updated_at
        description: "Last modification — incremental cursor"
      - name: data_source
        description: "Always 'salesforce'"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['salesforce']
      - name: _version
        description: "SystemModstamp as millisecond timestamp for deduplication"
        tests:
          - not_null

  - name: to_crm_activities
    description: >
      Salesforce Tasks + Events -> crm_activities (Silver Step 1, UNION ALL).
      Tasks: call/email/task based on CallType and TaskSubtype.
      Events: event/meeting based on EventSubtype.
      WhatId polymorphic resolution via Salesforce ID prefix (006=Opportunity, 001=Account).
      Duration: CallDurationInSeconds (tasks) or DurationInMinutes*60 (events).
    columns:
      - name: activity_id
        description: "Salesforce 18-char Task or Event ID"
        tests:
          - not_null
      - name: activity_type
        description: "Normalised: call, email, task, event, meeting"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['call', 'email', 'task', 'event', 'meeting']
      - name: owner_id
        description: "Activity owner — joins to crm_users.user_id"
        tests:
          - not_null
      - name: contact_id
        description: "WhoId — associated contact (nullable)"
      - name: deal_id
        description: "WhatId when prefix=006 (Opportunity)"
      - name: account_id
        description: "WhatId when prefix=001 (Account)"
      - name: timestamp
        description: "When activity occurred (ActivityDate for tasks, StartDateTime for events)"
        tests:
          - not_null
      - name: duration_seconds
        description: "Duration in seconds (CallDurationInSeconds or DurationInMinutes*60)"
      - name: outcome
        description: "Task Status (NULL for events)"
      - name: metadata
        description: "JSON with supplementary fields"
      - name: created_at
        description: "Record creation timestamp"
      - name: data_source
        description: "Always 'salesforce'"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['salesforce']
      - name: _version
        description: "SystemModstamp as millisecond timestamp for deduplication"
        tests:
          - not_null

  - name: to_crm_contacts
    description: >
      Salesforce Contacts -> crm_contacts (Silver Step 1).
      Reference data — external customers, not resolved to person_id.
      lifecycle_stage is NULL (Salesforce does not have lifecycle stages).
    columns:
      - name: contact_id
        description: "Salesforce 18-char Contact ID"
        tests:
          - not_null
      - name: email
        description: "Contact email (external customer, not identity-resolved)"
      - name: first_name
        description: "First name"
      - name: last_name
        description: "Last name"
      - name: owner_id
        description: "Assigned salesperson — joins to crm_users.user_id"
      - name: account_id
        description: "Associated account"
      - name: lifecycle_stage
        description: "Always NULL for Salesforce"
      - name: metadata
        description: "JSON with Title, Phone, LeadSource, IsDeleted"
      - name: custom_str_attrs
        description: "Empty Map — custom field promotion deferred"
      - name: custom_num_attrs
        description: "Empty Map — custom field promotion deferred"
      - name: created_at
        description: "Contact creation timestamp"
      - name: updated_at
        description: "Last modification timestamp"
      - name: data_source
        description: "Always 'salesforce'"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['salesforce']
      - name: _version
        description: "SystemModstamp as millisecond timestamp for deduplication"
        tests:
          - not_null

  - name: to_crm_accounts
    description: >
      Salesforce Accounts -> crm_accounts (Silver Step 1).
      Reference data — used for grouping deals and activities by company.
      Website mapped to domain. ParentId mapped to parent_account_id.
    columns:
      - name: account_id
        description: "Salesforce 18-char Account ID"
        tests:
          - not_null
      - name: name
        description: "Account name"
      - name: domain
        description: "Website URL"
      - name: industry
        description: "Industry classification"
      - name: owner_id
        description: "Account owner — joins to crm_users.user_id"
      - name: parent_account_id
        description: "Parent account for hierarchies (nullable)"
      - name: metadata
        description: "JSON with Type, BillingCity/State/Country, NumberOfEmployees, AnnualRevenue, IsDeleted"
      - name: created_at
        description: "Account creation timestamp"
      - name: updated_at
        description: "Last modification timestamp"
      - name: data_source
        description: "Always 'salesforce'"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['salesforce']
      - name: _version
        description: "SystemModstamp as millisecond timestamp for deduplication"
        tests:
          - not_null
