version: 2

sources:
  - name: bronze
    schema: raw
    tables:
      - name: claude_team_users
      - name: claude_team_code_usage
      - name: claude_team_workspaces
      - name: claude_team_workspace_members
      - name: claude_team_invites
      - name: claude_team_collection_runs

models:
  - name: to_ai_dev_usage
    description: >
      Claude Code developer usage from Claude Team connector.
      Filters code_usage to actor_type='user', maps actor_identifier as email.
      Feeds class_ai_dev_usage alongside Cursor and Windsurf.
    columns:
      - name: tenant_id
        description: "Tenant isolation field — framework-injected"
        tests:
          - not_null
      - name: insight_source_id
        description: "Connector instance identifier"
      - name: unique_id
        description: "Composite dedup key: date|actor_identifier|terminal_type"
        tests:
          - not_null
      - name: report_date
        description: "Usage date (ISO 8601)"
        tests:
          - not_null
      - name: email
        description: "User email (actor_identifier) — identity key for Silver step 2"
        tests:
          - not_null
      - name: terminal_type
        description: "Terminal type used for Claude Code session"
      - name: input_tokens
        description: "Input tokens consumed"
      - name: output_tokens
        description: "Output tokens generated"
      - name: cache_read_tokens
        description: "Tokens served from prompt cache"
      - name: cache_creation_tokens
        description: "Tokens written to prompt cache"
      - name: total_tokens
        description: "Derived: sum of all token fields"
      - name: tool_use_count
        description: "Tool/function calls — primary Claude Code developer signal"
      - name: session_count
        description: "Number of Claude Code sessions"
      - name: lines_generated
        description: "Lines of code generated"
      - name: person_id
        description: "NULL at Silver step 1 — resolved in step 2 via Identity Manager"
      - name: provider
        description: "Always 'anthropic'"
      - name: client
        description: "Always 'claude_code' (filtered at source)"
      - name: data_source
        description: "Always 'insight_claude_team' — source discriminator"
        tests:
          - not_null
          - accepted_values:
              values: ['insight_claude_team']
      - name: collected_at
        description: "When the record was collected"

  - name: to_ai_tool_usage
    description: >
      PLACEHOLDER — Anthropic Admin API does not currently expose per-user
      web/mobile activity. This model is disabled until the endpoint is available.
      See model file for expected Silver schema.
