version: 2

sources:
  - name: bronze_claude_admin
    schema: bronze_claude_admin
    tables:
      - name: claude_admin_users
      - name: claude_admin_messages_usage
      - name: claude_admin_cost_report
      - name: claude_admin_code_usage
      - name: claude_admin_api_keys
      - name: claude_admin_workspaces
      - name: claude_admin_workspace_members
      - name: claude_admin_invites
      - name: claude_admin_collection_runs

models:
  - name: claude_admin__ai_api_usage
    description: >
      Bronze → Silver step 1: Anthropic Admin API token usage → class_ai_api_usage.
      Sourced from claude_admin_messages_usage, enriched via LEFT JOIN with
      claude_admin_api_keys (key_name) and claude_admin_workspaces (workspace_name).
      person_id is always NULL at this stage — programmatic API usage has no direct
      user attribution (attribution is by api_key_id and workspace_id).
    columns:
      - name: tenant_id
        description: "Tenant isolation field — framework-injected"
        tests:
          - not_null
      - name: insight_source_id
        description: "Connector instance identifier"
      - name: unique_id
        description: "Composite dedup key: date|model|api_key_id|workspace_id|service_tier|context_window"
        tests:
          - not_null
          - unique
      - name: report_date
        description: "Usage date (ISO 8601)"
        tests:
          - not_null
      - name: model
        description: "Claude model ID (e.g. claude-opus-4-6, claude-sonnet-4-6)"
      - name: api_key_id
        description: "Anthropic API key identifier"
      - name: key_name
        description: "Human-readable key name (from claude_admin_api_keys)"
      - name: workspace_id
        description: "Anthropic workspace identifier"
      - name: workspace_name
        description: "Human-readable workspace name (from claude_admin_workspaces)"
      - name: service_tier
        description: "API service tier"
      - name: context_window
        description: "Context window size used"
      - name: uncached_input_tokens
        description: "Input tokens not served from cache"
      - name: cache_read_tokens
        description: "Input tokens served from prompt cache"
      - name: cache_creation_5m_tokens
        description: "Tokens written to 5-minute prompt cache"
      - name: cache_creation_1h_tokens
        description: "Tokens written to 1-hour prompt cache"
      - name: cache_creation_tokens
        description: "Derived: cache_creation_5m_tokens + cache_creation_1h_tokens"
      - name: output_tokens
        description: "Output tokens generated"
      - name: total_input_tokens
        description: "Derived: uncached + cache reads + cache creation"
      - name: total_tokens
        description: "Derived: total_input_tokens + output_tokens"
      - name: web_search_requests
        description: "Web search tool invocations"
      - name: person_id
        description: "Always NULL for API usage (no user attribution at this level)"
      - name: provider
        description: "Always 'anthropic'"
      - name: data_source
        description: "Always 'insight_claude_admin' — source discriminator"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['insight_claude_admin']
      - name: collected_at
        description: "When the record was collected"
        tests:
          - not_null

  - name: claude_admin__ai_dev_usage
    description: >
      Bronze → Silver step 1: Claude Code developer usage → class_ai_dev_usage.
      Sourced from claude_admin_code_usage, filtered to actor_type='user'.
      actor_identifier (email) is carried through as the identity key. Per-model
      token data is preserved in Bronze model_breakdown_json; token extraction
      is deferred to Silver step 2 or Gold.
    columns:
      - name: tenant_id
        description: "Tenant isolation field — framework-injected"
        tests:
          - not_null
      - name: insight_source_id
        description: "Connector instance identifier"
      - name: unique_id
        description: "Composite dedup key: date|actor_identifier|terminal_type"
        tests:
          - not_null
      - name: report_date
        description: "Usage date (ISO 8601)"
        tests:
          - not_null
      - name: email
        description: "User email (actor_identifier) — identity key for Silver step 2"
        tests:
          - not_null
      - name: terminal_type
        description: "Terminal type used for Claude Code session"
      - name: session_count
        description: "Number of Claude Code sessions"
      - name: lines_added
        description: "Lines of code added"
      - name: lines_removed
        description: "Lines of code removed"
      - name: tool_use_accepted
        description: "Accepted tool actions (sum across edit/write/multi_edit/notebook tools)"
      - name: tool_use_rejected
        description: "Rejected tool actions (sum across all tool types)"
      - name: person_id
        description: "NULL at Silver step 1 — resolved in step 2 via Identity Manager"
      - name: provider
        description: "Always 'anthropic'"
      - name: client
        description: "Always 'claude_code' (filtered at source)"
      - name: data_source
        description: "Always 'insight_claude_admin' — source discriminator"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['insight_claude_admin']
      - name: collected_at
        description: "When the record was collected"
