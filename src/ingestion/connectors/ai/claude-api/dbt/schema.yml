version: 2

sources:
  - name: bronze
    schema: raw
    tables:
      - name: claude_api_messages_usage
      - name: claude_api_cost_report
      - name: claude_api_keys
      - name: claude_api_workspaces
      - name: claude_api_invites
      - name: claude_api_collection_runs

models:
  - name: to_ai_api_usage
    description: >
      Unified API usage from Claude API connector.
      Joins messages_usage with keys and workspaces for dimension enrichment.
      person_id is always NULL (API usage has no direct user attribution).
    columns:
      - name: tenant_id
        description: "Tenant isolation field — framework-injected"
        tests:
          - not_null
      - name: insight_source_id
        description: "Connector instance identifier"
      - name: unique_id
        description: "Composite dedup key: date|model|api_key_id|workspace_id|service_tier|context_window"
        tests:
          - not_null
          - unique
      - name: report_date
        description: "Usage date (ISO 8601)"
        tests:
          - not_null
      - name: model
        description: "Claude model ID (e.g. claude-opus-4-6, claude-sonnet-4-6)"
      - name: api_key_id
        description: "Anthropic API key identifier"
      - name: key_name
        description: "Human-readable key name (from claude_api_keys)"
      - name: workspace_id
        description: "Anthropic workspace identifier"
      - name: workspace_name
        description: "Human-readable workspace name (from claude_api_workspaces)"
      - name: service_tier
        description: "API service tier"
      - name: context_window
        description: "Context window size used"
      - name: uncached_input_tokens
        description: "Input tokens not served from cache"
      - name: cache_read_tokens
        description: "Input tokens served from prompt cache"
      - name: cache_creation_5m_tokens
        description: "Tokens written to 5-minute prompt cache"
      - name: cache_creation_1h_tokens
        description: "Tokens written to 1-hour prompt cache"
      - name: cache_creation_tokens
        description: "Derived: cache_creation_5m_tokens + cache_creation_1h_tokens (aggregated per DESIGN §4.5)"
      - name: output_tokens
        description: "Output tokens generated"
      - name: total_input_tokens
        description: "Derived: all input tokens (uncached + cache reads + cache creation)"
      - name: total_tokens
        description: "Derived: total_input_tokens + output_tokens"
      - name: web_search_requests
        description: "Web search tool invocations"
      - name: person_id
        description: "Always NULL for API usage (no user attribution at this level)"
      - name: provider
        description: "Always 'anthropic'"
      - name: data_source
        description: "Always 'insight_claude_api' — source discriminator"
        tests:
          - not_null
          - accepted_values:
              values: ['insight_claude_api']
      - name: collected_at
        description: "When the record was collected"
        tests:
          - not_null
