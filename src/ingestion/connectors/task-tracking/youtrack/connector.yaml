        - type: HttpResponseFilter
          action: RETRY
          http_codes:
          - 429
          - 503
        - type: HttpResponseFilter
          action: FAIL
          http_codes:
          - 401
          - 403
      path: /api/issues
      request_parameters:
        query: 'updated: {{ stream_slice.start_time }} .. {{ stream_slice.end_time }} sort by: updated asc'
        fields: id,idReadable,summary,description,resolved,created,updated,project(id,shortName),reporter(id,login,fullName,email),tags(id,name),attachments(id,name,url,mimeType),links(id,direction,linkType(id,name,sourceToTarget,targetToSource),trimmedIssues(id,idReadable)),customFields(id,name,projectCustomField(id,field(id,name,localizedName,fieldType(id,valueType,isMultiValue))),value(id,name,fullName,login,presentation,localizedName,text,minutes,description,color(presentation)))
