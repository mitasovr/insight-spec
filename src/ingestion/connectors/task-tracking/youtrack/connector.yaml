spec:
  type: Spec
  connection_specification:
    type: object
    $schema: http://json-schema.org/draft-07/schema#
    required:
    - youtrack_base_url
    - youtrack_token
    - insight_tenant_id
    - insight_source_id
    properties:
      youtrack_base_url:
        type: string
        title: YouTrack Base URL
        description: 'YouTrack base URL (no trailing slash). Cloud example: https://myorg.youtrack.cloud. Self-hosted example: https://youtrack.myorg.local'
        order: 0
      youtrack_token:
        type: string
        title: YouTrack Permanent Token
        description: "Bearer token (Profile \u2192 Account Security \u2192 Tokens). Must grant read access to every project the service account can see and to /api/admin/projects/{id}/customFields."
        airbyte_secret: true
        order: 1
      insight_tenant_id:
        type: string
        title: Insights Tenant ID
        description: Tenant isolation identifier for the ingestion layer.
        order: 2
      insight_source_id:
        type: string
        title: Source Instance ID
        description: Instance discriminator (e.g. youtrack-main).
        order: 3
      youtrack_start_date:
        type: string
        title: Start Date
        description: Earliest issue `updated` timestamp to sync from (YYYY-MM-DD). Default 2020-01-01. Applied by the incremental issue stream (added in feature 2.3).
        default: '2020-01-01'
        order: 4
      youtrack_page_size:
        type: integer
        title: Issue Page Size
        description: Page size ($top) for the issue search stream (feature 2.3). Default 100, range 1-500.
        default: 100
        minimum: 1
        maximum: 500
        order: 5
      youtrack_activities_page_size:
        type: integer
        title: Activities Page Size
        description: Page size ($top) for /api/issues/{id}/activitiesPage cursor pagination (feature 2.3). Default 200, range 1-500.
        default: 200
        minimum: 1
        maximum: 500
        order: 6
    additionalProperties: true
concurrency_level:
  type: ConcurrencyLevel
  default_concurrency: 3
