version: 6.60.9

type: DeclarativeSource

check:
  type: CheckStream
  stream_names:
    - jira_projects

definitions:
  linked:
    HttpRequester:
      authenticator:
        type: BasicHttpAuthenticator
        username: "{{ config['jira_email'] }}"
        password: "{{ config['jira_api_token'] }}"
      error_handler:
        type: DefaultErrorHandler
        backoff_strategies:
          - type: WaitTimeFromHeader
            header: Retry-After
        response_filters:
          - type: HttpResponseFilter
            action: RETRY
            http_codes:
              - 429
              - 503
          - type: HttpResponseFilter
            action: FAIL
            http_codes:
              - 401
              - 403
          - type: HttpResponseFilter
            action: IGNORE
            http_codes:
              - 400
              - 404
      request_parameters:
        jql: >-
          project IN ({{ config['jira_project_keys'] }}) AND updated >= "{{
          stream_slice.start_time }}" AND updated <= "{{ stream_slice.end_time
          }}" ORDER BY updated ASC
        expand: names
        fields: "*all"
    SimpleRetriever:
      paginator:
        type: DefaultPaginator
        page_size_option:
          type: RequestOption
          inject_into: request_parameter
          field_name: maxResults
        page_token_option:
          type: RequestOption
          inject_into: request_parameter
          field_name: startAt
        pagination_strategy:
          type: OffsetIncrement
          page_size: 50

