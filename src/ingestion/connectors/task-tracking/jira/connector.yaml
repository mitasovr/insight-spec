spec:
  type: Spec
  connection_specification:
    type: object
    $schema: http://json-schema.org/draft-07/schema#
    required:
      - jira_instance_url
      - jira_email
      - jira_api_token
      - insight_tenant_id
      - insight_source_id
      - jira_project_keys
    properties:
      jira_instance_url:
        type: string
        description: Jira Cloud instance URL (e.g., https://myorg.atlassian.net)
        title: Jira Instance URL
        order: 0
      jira_email:
        type: string
        description: Email for Jira API token authentication
        title: Jira Email
        order: 1
      jira_api_token:
        type: string
        title: Jira API Token
        airbyte_secret: true
        order: 2
      insight_tenant_id:
        type: string
        description: Tenant isolation identifier for the ingestion layer
        title: Insights Tenant ID
        order: 3
      insight_source_id:
        type: string
        description: Instance discriminator (e.g., jira-team-alpha)
        title: Source Instance ID
        order: 4
      jira_project_keys:
        type: string
        description: >-
          Comma-separated project keys to sync (e.g., TC,TNG). Required — Jira
          Cloud does not allow unbounded queries.
        title: Project Keys
        order: 5
      jira_start_date:
        type: string
        description: "Earliest date to sync issues from (YYYY-MM-DD). Default: 2020-01-01"
        title: Start Date
        default: "2020-01-01"
        order: 6
      jira_page_size:
        type: integer
        description: Page size for JQL search (default 50, max 100)
        title: Page Size
        default: 50
        minimum: 1
        maximum: 100
        order: 7
      jira_story_points_field_id:
        type: string
        description: >-
          Instance-specific custom field ID for Story Points (e.g.,
          customfield_10016 for Next-gen). Leave default if unsure.
        title: Story Points Field ID
        default: customfield_10016
        order: 8
    additionalProperties: true

