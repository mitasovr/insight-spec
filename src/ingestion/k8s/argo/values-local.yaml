# Helm values for argo/argo-workflows chart
# Local Kind cluster — minimal resources, server auth mode

server:
  extraArgs:
    - "--auth-mode=server"
  serviceType: NodePort
  serviceNodePort: 30500
  resources:
    requests:
      memory: 128Mi
      cpu: 100m

controller:
  workflowNamespaces:
    - argo
  resources:
    requests:
      memory: 128Mi
      cpu: 100m

workflow:
  serviceAccount:
    create: true
    name: argo-workflow

executor:
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
