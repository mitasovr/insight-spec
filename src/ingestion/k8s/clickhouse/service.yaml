apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: data
  labels:
    app: clickhouse
spec:
  type: NodePort
  selector:
    app: clickhouse
  ports:
    - name: http
      port: 8123
      targetPort: 8123
      nodePort: 30123
      protocol: TCP
    - name: native
      port: 9000
      targetPort: 9000
      nodePort: 30900
      protocol: TCP
