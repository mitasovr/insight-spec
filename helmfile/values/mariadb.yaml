##
## Bitnami MariaDB — local development overrides
##
## Chart: https://github.com/bitnami/charts/tree/main/bitnami/mariadb
##

image:
  tag: latest

architecture: standalone

primary:
  persistence:
    size: 2Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
