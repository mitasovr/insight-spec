##
## Bitnami ClickHouse — local development overrides
##
## Chart: https://github.com/bitnami/charts/tree/main/bitnami/clickhouse
##
## Note: bitnami/clickhouse:latest is not available on Docker Hub.
## Use the official clickhouse image via registry override.
##

global:
  security:
    allowInsecureImages: true

image:
  registry: docker.io
  repository: clickhouse/clickhouse-server
  tag: "25.3"

replicaCount: 1
shards: 1

persistence:
  size: 5Gi

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

# Keeper (built-in ZooKeeper replacement) — single node is fine for local
keeper:
  enabled: true

# No external ZooKeeper needed
zookeeper:
  enabled: false

logLevel: information
