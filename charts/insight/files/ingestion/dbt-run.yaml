apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: dbt-run
  labels:
    app.kubernetes.io/part-of: ingestion
spec:
  entrypoint: run
  templates:
    - name: run
      inputs:
        parameters:
          - name: dbt_select
            default: "tag:silver"
          - name: toolbox_image
            default: "ghcr.io/cyberfabric/insight-toolbox:latest"
          - name: clickhouse_host
            default: "__CLICKHOUSE_FQDN__"
          - name: clickhouse_port
            default: "__CLICKHOUSE_PORT__"
      activeDeadlineSeconds: 1800
      script:
        image: "{{inputs.parameters.toolbox_image}}"
        command: [bash]
        env:
          - name: CLICKHOUSE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: clickhouse-credentials
                key: password
        source: |
          cd /ingestion/dbt
          CH_PASS="${CLICKHOUSE_PASSWORD}"
          cat > profiles.yml <<PROFILES
          ingestion:
            target: k8s
            outputs:
              k8s:
                type: clickhouse
                host: "{{inputs.parameters.clickhouse_host}}"
                port: {{inputs.parameters.clickhouse_port}}
                schema: silver
                user: default
                password: "${CH_PASS}"
                secure: false
          PROFILES
          dbt run --profiles-dir . --select "{{inputs.parameters.dbt_select}}"
