apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: airbyte-sync
  labels:
    app.kubernetes.io/part-of: ingestion
spec:
  entrypoint: sync
  templates:
    - name: sync
      inputs:
        parameters:
          - name: connection_id
          - name: airbyte_url
            default: "__AIRBYTE_URL__"
      steps:
        - - name: trigger
            template: trigger-sync
            arguments:
              parameters:
                - name: connection_id
                  value: "{{inputs.parameters.connection_id}}"
                - name: airbyte_url
                  value: "{{inputs.parameters.airbyte_url}}"
        - - name: poll
            template: poll-job
            arguments:
              parameters:
                - name: job_id
                  value: "{{steps.trigger.outputs.result}}"
                - name: airbyte_url
                  value: "{{inputs.parameters.airbyte_url}}"

    - name: mint-token
      # Mints a short-lived JWT from airbyte-auth-secrets (in-cluster).
      # Each step that needs the Airbyte API calls this inline.
      script:
        image: python:3.12-alpine
        command: [python3]
        env:
          - name: JWT_SECRET
            valueFrom:
              secretKeyRef:
                name: airbyte-auth-secrets
                key: jwt-signature-secret
        source: |
          import hmac, hashlib, base64, json, time, os
          def b64url(data):
              return base64.urlsafe_b64encode(json.dumps(data).encode()).rstrip(b"=").decode()
          header = b64url({"alg": "HS256", "typ": "JWT"})
          now = int(time.time())
          payload = b64url({"iss": "airbyte-server", "sub": "00000000-0000-0000-0000-000000000000", "iat": now, "exp": now + 300})
          sig = base64.urlsafe_b64encode(hmac.new(os.environ["JWT_SECRET"].encode(), f"{header}.{payload}".encode(), hashlib.sha256).digest()).rstrip(b"=").decode()
          print(f"{header}.{payload}.{sig}")

    - name: trigger-sync
      inputs:
        parameters:
          - name: connection_id
          - name: airbyte_url
      script:
        image: python:3.12-alpine
        command: [python3]
        env:
          - name: JWT_SECRET
            valueFrom:
              secretKeyRef:
                name: airbyte-auth-secrets
                key: jwt-signature-secret
        source: |
          import urllib.request, json, sys, hmac, hashlib, base64, time, os
          def b64url(data):
              return base64.urlsafe_b64encode(json.dumps(data).encode()).rstrip(b"=").decode()
          def mint_token():
              header = b64url({"alg": "HS256", "typ": "JWT"})
              now = int(time.time())
              payload = b64url({"iss": "airbyte-server", "sub": "00000000-0000-0000-0000-000000000000", "iat": now, "exp": now + 300})
              sig = base64.urlsafe_b64encode(hmac.new(os.environ["JWT_SECRET"].encode(), f"{header}.{payload}".encode(), hashlib.sha256).digest()).rstrip(b"=").decode()
              return f"{header}.{payload}.{sig}"
          url = "{{inputs.parameters.airbyte_url}}/api/v1/connections/sync"
          token = mint_token()
          headers = {"Content-Type": "application/json", "Authorization": f"Bearer {token}"}
          data = json.dumps({"connectionId": "{{inputs.parameters.connection_id}}"}).encode()
          req = urllib.request.Request(url, data=data, headers=headers)
          try:
              resp = json.load(urllib.request.urlopen(req))
          except urllib.error.HTTPError as e:
              body = e.read().decode()
              print(f"Airbyte API error {e.code}: {body}", file=sys.stderr)
              sys.exit(1)
          job_id = resp["job"]["id"]
          print(job_id)

    - name: poll-job
      inputs:
        parameters:
          - name: job_id
          - name: airbyte_url
      activeDeadlineSeconds: 3600
      script:
        image: python:3.12-alpine
        command: [python3]
        env:
          - name: JWT_SECRET
            valueFrom:
              secretKeyRef:
                name: airbyte-auth-secrets
                key: jwt-signature-secret
        source: |
          import urllib.request, json, time, sys, hmac, hashlib, base64, os
          def b64url(data):
              return base64.urlsafe_b64encode(json.dumps(data).encode()).rstrip(b"=").decode()
          def mint_token():
              header = b64url({"alg": "HS256", "typ": "JWT"})
              now = int(time.time())
              payload = b64url({"iss": "airbyte-server", "sub": "00000000-0000-0000-0000-000000000000", "iat": now, "exp": now + 300})
              sig = base64.urlsafe_b64encode(hmac.new(os.environ["JWT_SECRET"].encode(), f"{header}.{payload}".encode(), hashlib.sha256).digest()).rstrip(b"=").decode()
              return f"{header}.{payload}.{sig}"
          while True:
              token = mint_token()
              headers = {"Content-Type": "application/json", "Authorization": f"Bearer {token}"}
              req = urllib.request.Request(
                  "{{inputs.parameters.airbyte_url}}/api/v1/jobs/get",
                  data=json.dumps({"id": int("{{inputs.parameters.job_id}}")}).encode(),
                  headers=headers)
              resp = json.load(urllib.request.urlopen(req))
              status = resp["job"]["status"]
              print(f"Job {{inputs.parameters.job_id}} status: {status}", flush=True)
              if status == "succeeded":
                  print("Sync complete")
                  sys.exit(0)
              elif status in ("failed", "cancelled"):
                  print(f"Sync failed: {status}")
                  sys.exit(1)
              time.sleep(30)
