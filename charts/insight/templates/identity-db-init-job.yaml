{{/*
Identity-resolution database bootstrap.

Provisions the per-service MariaDB database that ADR-0006 mandates for
the Rust identity-resolution service. Runs as a Helm pre-install /
pre-upgrade hook so the database exists *before* the identity pod's
init container tries to apply its sea-orm migrations.

Why a Job and not `mariadb.primary.initdbScripts`?
  - `initdbScripts` only runs on the FIRST chart install (when the
    PVC is empty). On every subsequent `helm upgrade` it is a no-op.
  - The Job runs on every install AND upgrade — idempotent CREATE
    DATABASE / GRANT semantics make this safe and the database
    survives operator reconfiguration of the chart.
  - Establishes a generic pattern: future services that own their
    own MariaDB database (per ADR-0006) can mirror this template.

Conditional on `identityResolution.deploy=true` and `mariadb.deploy=true`.
External MariaDB users are responsible for pre-provisioning the
`{{ .Values.identityResolution.databaseName }}` database and granting
access to the `{{ .Values.mariadb.username }}` user out of band.
*/}}
{{- if and .Values.identityResolution.deploy .Values.mariadb.deploy }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-identity-db-init
  labels:
    {{- include "insight.labels" . | nindent 4 }}
    app.kubernetes.io/component: identity-db-init
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 5
  template:
    metadata:
      labels:
        {{- include "insight.labels" . | nindent 8 }}
        app.kubernetes.io/component: identity-db-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mariadb-client
          image: {{ printf "%s/%s:%s"
            .Values.mariadb.image.registry
            .Values.mariadb.image.repository
            (.Values.mariadb.image.tag | default "latest") | quote }}
          imagePullPolicy: IfNotPresent
          env:
            - name: MARIADB_HOST
              value: {{ include "insight.mariadb.host" . | quote }}
            - name: MARIADB_PORT
              value: {{ include "insight.mariadb.port" . | quote }}
            - name: MARIADB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mariadb.passwordSecret.name | quote }}
                  key:  mariadb-root-password
            - name: MARIADB_APP_USER
              value: {{ required "mariadb.username is required" .Values.mariadb.username | quote }}
            - name: IDENTITY_DB_NAME
              value: {{ required "identityResolution.databaseName is required" .Values.identityResolution.databaseName | quote }}
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              # Wait for the MariaDB service to accept connections — Helm
              # `--wait` only checks our resources, not subchart pods.
              for i in $(seq 1 60); do
                if mariadb -h "$MARIADB_HOST" -P "$MARIADB_PORT" \
                    -u root --password="$MARIADB_ROOT_PASSWORD" \
                    -e "SELECT 1" >/dev/null 2>&1; then
                  break
                fi
                if [ "$i" -eq 60 ]; then
                  echo "ERROR: MariaDB at $MARIADB_HOST:$MARIADB_PORT did not become reachable in 60s" >&2
                  exit 1
                fi
                sleep 1
              done

              # Idempotent provisioning: CREATE DATABASE IF NOT EXISTS +
              # repeated GRANT (no harm, no privilege widening since the
              # GRANT is identical on every run).
              mariadb -h "$MARIADB_HOST" -P "$MARIADB_PORT" \
                  -u root --password="$MARIADB_ROOT_PASSWORD" <<SQL
              CREATE DATABASE IF NOT EXISTS \`${IDENTITY_DB_NAME}\`
                CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
              GRANT ALL PRIVILEGES ON \`${IDENTITY_DB_NAME}\`.* TO '${MARIADB_APP_USER}'@'%';
              FLUSH PRIVILEGES;
              SQL
              echo "Provisioned identity database '${IDENTITY_DB_NAME}' for user '${MARIADB_APP_USER}'"
{{- end }}
