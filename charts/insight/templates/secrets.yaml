{{/*
==============================================================================
 Auto-generated credentials
==============================================================================
The umbrella provisions two Secrets:

  1. `{release}-db-creds` — raw passwords consumed by the bundled infra
     charts (mariadb, redis, clickhouse). Keys match the field names those
     charts expect natively (or that we configure them to use).

  2. `{release}-analytics-api-config` — pre-assembled env vars for the
     analytics-api Rust service, including a full `ANALYTICS__database_url`
     that embeds the MariaDB password generated in (1). Same pattern can
     be extended to identity-resolution and other backend services.

The `lookup` call on first line makes this idempotent: on subsequent
`helm upgrade` runs we REUSE the existing Secret values, so pod restarts
do not invalidate credentials or cause DB auth mismatches.

Fresh install (no existing Secret) → randAlphaNum 24 per field.

Constructor Platform / BYO path: the customer creates `{release}-db-creds`
with their own values BEFORE the first `helm install`. The lookup finds
that Secret and uses its values — no generation happens. To bypass
auto-gen entirely (e.g. in an air-gapped env where lookup is undesirable),
set `credentials.autoGenerate: false` in values and pre-create the Secret.
==============================================================================
*/}}

{{- if .Values.credentials.autoGenerate }}

{{- /* Attempt lookup; falls back to generation on first install. */ -}}
{{- $dbSec := lookup "v1" "Secret" .Release.Namespace (printf "%s-db-creds" .Release.Name) -}}

{{- /* Resolve each password: reuse existing or generate. */ -}}
{{- $chPass := "" -}}
{{- $mdbPass := "" -}}
{{- $mdbRoot := "" -}}
{{- $redisPass := "" -}}
{{- if $dbSec -}}
  {{- $chPass    = index $dbSec.data "clickhouse-password"    | b64dec -}}
  {{- $mdbPass   = index $dbSec.data "mariadb-password"       | b64dec -}}
  {{- $mdbRoot   = index $dbSec.data "mariadb-root-password"  | b64dec -}}
  {{- $redisPass = index $dbSec.data "redis-password"         | b64dec -}}
{{- else -}}
  {{- $chPass    = randAlphaNum 24 -}}
  {{- $mdbPass   = randAlphaNum 24 -}}
  {{- $mdbRoot   = randAlphaNum 24 -}}
  {{- $redisPass = randAlphaNum 24 -}}
{{- end -}}

---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-db-creds
  labels:
    {{- include "insight.labels" . | nindent 4 }}
  annotations:
    # Helm-managed. If a user pre-creates this Secret before the first
    # install, ownership transfers on `helm install` (no conflict).
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  clickhouse-password:   {{ $chPass    | quote }}
  mariadb-password:      {{ $mdbPass   | quote }}
  mariadb-root-password: {{ $mdbRoot   | quote }}
  redis-password:        {{ $redisPass | quote }}

---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-analytics-api-config
  labels:
    {{- include "insight.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Full DSN, password interpolated from generated credentials.
  ANALYTICS__database_url: {{ printf "mysql://%s:%s@%s:%v/%s"
    (.Values.mariadb.username | default "insight")
    $mdbPass
    (include "insight.mariadb.host" .)
    (include "insight.mariadb.port" .)
    (include "insight.mariadb.database" .)
    | quote }}
  ANALYTICS__clickhouse_url:          {{ include "insight.clickhouse.url" . | quote }}
  ANALYTICS__clickhouse_database:     {{ include "insight.clickhouse.database" . | quote }}
  ANALYTICS__clickhouse_user:         {{ .Values.clickhouse.username | default "insight" | quote }}
  ANALYTICS__clickhouse_password:     {{ $chPass | quote }}
  ANALYTICS__identity_resolution_url: {{ printf "http://%s:8082" (include "insight.identityResolution.host" .) | quote }}
  ANALYTICS__redis_url:               {{ printf "redis://:%s@%s:%v" $redisPass (include "insight.redis.host" .) (include "insight.redis.port" .) | quote }}
  ANALYTICS__bind_addr:               "0.0.0.0:8081"

{{- if .Values.identityResolution.deploy }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-identity-resolution-config
  labels:
    {{- include "insight.labels" . | nindent 4 }}
type: Opaque
stringData:
  IDENTITY__clickhouse_url:      {{ include "insight.clickhouse.url" . | quote }}
  IDENTITY__clickhouse_database: {{ include "insight.clickhouse.database" . | quote }}
  IDENTITY__clickhouse_user:     {{ .Values.clickhouse.username | default "insight" | quote }}
  IDENTITY__clickhouse_password: {{ $chPass | quote }}
{{- end }}

{{- end }}
