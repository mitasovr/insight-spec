{{- if .Values.ingestion.templates.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: dbt-run
  labels:
    {{- include "insight.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingestion-template
spec:
  entrypoint: run
  templates:
    - name: run
      inputs:
        parameters:
          - name: dbt_select
            default: "tag:silver"
          - name: toolbox_image
            default: "ghcr.io/cyberfabric/insight-toolbox:latest"
          - name: clickhouse_host
            default: {{ include "insight.clickhouse.fqdn" . | quote }}
          - name: clickhouse_port
            default: {{ include "insight.clickhouse.port" . | quote }}
      activeDeadlineSeconds: 1800
      script:
        image: {{ `"{{inputs.parameters.toolbox_image}}"` }}
        imagePullPolicy: Always
        command: [bash]
        env:
          - name: CLICKHOUSE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ .Values.clickhouse.passwordSecret.name | quote }}
                key:  {{ .Values.clickhouse.passwordSecret.key  | quote }}
        source: |
          cd /ingestion/dbt
          CH_PASS="${CLICKHOUSE_PASSWORD}"
          cat > profiles.yml <<PROFILES
          ingestion:
            target: k8s
            outputs:
              k8s:
                type: clickhouse
                host: {{ `"{{inputs.parameters.clickhouse_host}}"` }}
                port: {{ `{{inputs.parameters.clickhouse_port}}` }}
                schema: silver
                user: default
                password: "${CH_PASS}"
                secure: false
                send_receive_timeout: 1500
                query_limit: 0
                connect_timeout: 30
          PROFILES
          dbt run --profiles-dir . --select {{ `"{{inputs.parameters.dbt_select}}"` }}
{{- end }}
