{{- if .Values.ingestion.templates.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: ingestion-pipeline
  labels:
    {{- include "insight.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingestion-template
spec:
  entrypoint: pipeline
  templates:
    - name: pipeline
      inputs:
        parameters:
          - name: connection_id
          - name: insight_source_id
            default: ""
          # When `data_source=jira` the pipeline runs:
          #   sync → dbt(tag:jira) → jira-enrich → dbt(tag:silver)
          # For any other value only the legacy single-dbt path runs (tag:silver).
          - name: data_source
            default: ""
          - name: dbt_select_staging
            default: "tag:jira"
          - name: dbt_select
            default: "tag:silver"
          - name: toolbox_image
            default: "ghcr.io/cyberfabric/insight-toolbox:latest"
          - name: airbyte_url
            default: {{ include "insight.airbyte.url" . | quote }}
          - name: clickhouse_host
            default: {{ include "insight.clickhouse.fqdn" . | quote }}
          - name: clickhouse_port
            default: {{ include "insight.clickhouse.port" . | quote }}
      dag:
        tasks:
          - name: sync
            templateRef:
              name: airbyte-sync
              template: sync
            arguments:
              parameters:
                - name: connection_id
                  value: {{ `"{{inputs.parameters.connection_id}}"` }}
                - name: airbyte_url
                  value: {{ `"{{inputs.parameters.airbyte_url}}"` }}

          # ------ Jira: sync → dbt(tag:jira) → jira-enrich → dbt(tag:silver) ------
          - name: transform-jira-staging
            depends: sync
            when: {{ `"'{{inputs.parameters.data_source}}' == 'jira'"` }}
            templateRef:
              name: dbt-run
              template: run
            arguments:
              parameters:
                - name: dbt_select
                  value: {{ `"{{inputs.parameters.dbt_select_staging}}"` }}
                - name: toolbox_image
                  value: {{ `"{{inputs.parameters.toolbox_image}}"` }}
                - name: clickhouse_host
                  value: {{ `"{{inputs.parameters.clickhouse_host}}"` }}
                - name: clickhouse_port
                  value: {{ `"{{inputs.parameters.clickhouse_port}}"` }}

          - name: enrich
            depends: transform-jira-staging
            when: {{ `"'{{inputs.parameters.data_source}}' == 'jira'"` }}
            templateRef:
              name: tt-enrich-jira-run
              template: run
            arguments:
              parameters:
                - name: insight_source_id
                  value: {{ `"{{inputs.parameters.insight_source_id}}"` }}
                - name: clickhouse_host
                  value: {{ `"{{inputs.parameters.clickhouse_host}}"` }}
                - name: clickhouse_port
                  value: {{ `"{{inputs.parameters.clickhouse_port}}"` }}

          - name: transform-jira-silver
            depends: enrich
            when: {{ `"'{{inputs.parameters.data_source}}' == 'jira'"` }}
            templateRef:
              name: dbt-run
              template: run
            arguments:
              parameters:
                - name: dbt_select
                  value: {{ `"{{inputs.parameters.dbt_select}}"` }}
                - name: toolbox_image
                  value: {{ `"{{inputs.parameters.toolbox_image}}"` }}
                - name: clickhouse_host
                  value: {{ `"{{inputs.parameters.clickhouse_host}}"` }}
                - name: clickhouse_port
                  value: {{ `"{{inputs.parameters.clickhouse_port}}"` }}

          # ------ Non-Jira: legacy single-dbt path ------
          - name: transform-legacy
            depends: sync
            when: {{ `"'{{inputs.parameters.data_source}}' != 'jira'"` }}
            templateRef:
              name: dbt-run
              template: run
            arguments:
              parameters:
                - name: dbt_select
                  value: {{ `"{{inputs.parameters.dbt_select}}"` }}
                - name: toolbox_image
                  value: {{ `"{{inputs.parameters.toolbox_image}}"` }}
                - name: clickhouse_host
                  value: {{ `"{{inputs.parameters.clickhouse_host}}"` }}
                - name: clickhouse_port
                  value: {{ `"{{inputs.parameters.clickhouse_port}}"` }}
{{- end }}
