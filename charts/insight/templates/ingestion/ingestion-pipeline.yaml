{{- if .Values.ingestion.templates.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: ingestion-pipeline
  labels:
    {{- include "insight.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingestion-template
spec:
  entrypoint: pipeline
  templates:
    - name: pipeline
      # Every input parameter is REQUIRED and must be supplied by the
      # invoker (api-gateway / cron). The chart deliberately ships no
      # defaults so that runtime hosts, image tags and dbt selectors
      # come from the platform ConfigMap (`{release}-platform`) and
      # the caller's own configuration — never from chart-time defaults.
      inputs:
        parameters:
          - name: connection_id
          - name: insight_source_id
          - name: data_source                # "jira" → enriched path; anything else → legacy single-dbt
          - name: dbt_select_staging         # e.g. "tag:jira"
          - name: dbt_select                 # e.g. "tag:silver"
          - name: toolbox_image              # ghcr.io/cyberfabric/insight-toolbox:<sha or version>
          - name: jira_enrich_image          # ghcr.io/cyberfabric/insight-jira-enrich:<sha or version>
          - name: airbyte_url
          - name: clickhouse_host
          - name: clickhouse_port
          - name: clickhouse_user
      dag:
        tasks:
          - name: sync
            templateRef:
              name: airbyte-sync
              template: sync
            arguments:
              parameters:
                - name: connection_id
                  value: {{ `"{{inputs.parameters.connection_id}}"` }}
                - name: airbyte_url
                  value: {{ `"{{inputs.parameters.airbyte_url}}"` }}

          # ------ Jira: sync → dbt(tag:jira) → jira-enrich → dbt(tag:silver) ------
          - name: transform-jira-staging
            depends: sync
            when: {{ `"'{{inputs.parameters.data_source}}' == 'jira'"` }}
            templateRef:
              name: dbt-run
              template: run
            arguments:
              parameters:
                - name: dbt_select
                  value: {{ `"{{inputs.parameters.dbt_select_staging}}"` }}
                - name: toolbox_image
                  value: {{ `"{{inputs.parameters.toolbox_image}}"` }}
                - name: clickhouse_host
                  value: {{ `"{{inputs.parameters.clickhouse_host}}"` }}
                - name: clickhouse_port
                  value: {{ `"{{inputs.parameters.clickhouse_port}}"` }}
                - name: clickhouse_user
                  value: {{ `"{{inputs.parameters.clickhouse_user}}"` }}

          - name: enrich
            depends: transform-jira-staging
            when: {{ `"'{{inputs.parameters.data_source}}' == 'jira'"` }}
            templateRef:
              name: tt-enrich-jira-run
              template: run
            arguments:
              parameters:
                - name: insight_source_id
                  value: {{ `"{{inputs.parameters.insight_source_id}}"` }}
                - name: jira_enrich_image
                  value: {{ `"{{inputs.parameters.jira_enrich_image}}"` }}
                - name: clickhouse_host
                  value: {{ `"{{inputs.parameters.clickhouse_host}}"` }}
                - name: clickhouse_port
                  value: {{ `"{{inputs.parameters.clickhouse_port}}"` }}
                - name: clickhouse_user
                  value: {{ `"{{inputs.parameters.clickhouse_user}}"` }}
                - name: batch_size
                  value: "10000"

          - name: transform-jira-silver
            depends: enrich
            when: {{ `"'{{inputs.parameters.data_source}}' == 'jira'"` }}
            templateRef:
              name: dbt-run
              template: run
            arguments:
              parameters:
                - name: dbt_select
                  value: {{ `"{{inputs.parameters.dbt_select}}"` }}
                - name: toolbox_image
                  value: {{ `"{{inputs.parameters.toolbox_image}}"` }}
                - name: clickhouse_host
                  value: {{ `"{{inputs.parameters.clickhouse_host}}"` }}
                - name: clickhouse_port
                  value: {{ `"{{inputs.parameters.clickhouse_port}}"` }}
                - name: clickhouse_user
                  value: {{ `"{{inputs.parameters.clickhouse_user}}"` }}

          # ------ Non-Jira: legacy single-dbt path ------
          - name: transform-legacy
            depends: sync
            when: {{ `"'{{inputs.parameters.data_source}}' != 'jira'"` }}
            templateRef:
              name: dbt-run
              template: run
            arguments:
              parameters:
                - name: dbt_select
                  value: {{ `"{{inputs.parameters.dbt_select}}"` }}
                - name: toolbox_image
                  value: {{ `"{{inputs.parameters.toolbox_image}}"` }}
                - name: clickhouse_host
                  value: {{ `"{{inputs.parameters.clickhouse_host}}"` }}
                - name: clickhouse_port
                  value: {{ `"{{inputs.parameters.clickhouse_port}}"` }}
                - name: clickhouse_user
                  value: {{ `"{{inputs.parameters.clickhouse_user}}"` }}
{{- end }}
