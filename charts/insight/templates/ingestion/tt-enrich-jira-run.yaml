{{- if .Values.ingestion.templates.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: tt-enrich-jira-run
  labels:
    {{- include "insight.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingestion-template
spec:
  imagePullSecrets:
    - name: ghcr-pull
  entrypoint: run
  templates:
    - name: run
      inputs:
        parameters:
          - name: insight_source_id
          - name: clickhouse_host
            default: {{ include "insight.clickhouse.fqdn" . | quote }}
          - name: clickhouse_port
            default: {{ include "insight.clickhouse.port" . | quote }}
          - name: clickhouse_user
            default: {{ .Values.clickhouse.username | default "insight" | quote }}
          - name: batch_size
            default: "10000"
      activeDeadlineSeconds: 7200
      container:
        image: ghcr.io/cyberfabric/insight-jira-enrich:latest
        imagePullPolicy: Always
        # Emissary executor can't resolve local-image entrypoints via registry,
        # so set command explicitly (matches Dockerfile ENTRYPOINT).
        command: ["/usr/local/bin/jira-enrich"]
        env:
          - name: CLICKHOUSE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ .Values.clickhouse.passwordSecret.name | quote }}
                key:  {{ .Values.clickhouse.passwordSecret.key  | quote }}
          - name: RUST_LOG
            value: "info"
        args:
          - {{ `"--insight-source-id={{inputs.parameters.insight_source_id}}"` }}
          - {{ `"--clickhouse-host={{inputs.parameters.clickhouse_host}}"` }}
          - {{ `"--clickhouse-port={{inputs.parameters.clickhouse_port}}"` }}
          - {{ `"--clickhouse-user={{inputs.parameters.clickhouse_user}}"` }}
          - {{ `"--batch-size={{inputs.parameters.batch_size}}"` }}
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2"
            memory: "2Gi"
{{- end }}
