{{/*
Argo WorkflowTemplates for ingestion pipelines.

These files live in files/ingestion/*.yaml and are emitted verbatim via
.Files.Get — no Helm templating. That avoids having to escape Argo's
{{inputs.parameters.foo}} syntax, which appears many times in the script
blocks of those templates.

URL/host customization happens via arguments.parameters when submitting
a CronWorkflow, not via Helm. Defaults in the files already match the
expected namespace layout (see ../values.yaml).

The Argo controller must watch this namespace — see deploy/argo/values.yaml
workflowNamespaces: [argo, insight].
*/}}
{{- if .Values.ingestion.templates.enabled }}
{{- range $path, $_ := .Files.Glob "files/ingestion/*.yaml" }}
---
{{ $.Files.Get $path }}
{{- end }}
{{- end }}
