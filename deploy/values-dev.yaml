##
## Insight umbrella — dev / eval overlay.
##
## With `credentials.autoGenerate: true` (the default) the umbrella now
## generates all DB passwords at install time and stores them in
## `{release}-db-creds`. No static credentials are needed in this overlay.
##
## `dev-up.sh` applies it automatically via INSIGHT_VALUES_FILES.
##

# Single-replica app services for dev — the canonical chart uses 2
# replicas per service for production HA / zero-downtime rolling updates,
# which is wasteful on a single-node Kind cluster.
apiGateway:
  replicaCount: 1
analyticsApi:
  replicaCount: 1
