##
## Argo Workflows — additional RBAC for Insight.
##
## argo-workflow-executor — Role bound to the default ServiceAccount
## in each workflow namespace. Required so the Argo executor can write
## step results to the K8s API.
##
## Applied by install-argo.sh after the chart is installed.
##
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-workflow-executor
  namespace: argo
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["workflowtaskresults"]
    verbs: ["create", "patch", "get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "watch", "patch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-workflow-executor
  namespace: argo
subjects:
  - kind: ServiceAccount
    name: default
    namespace: argo
roleRef:
  kind: Role
  name: argo-workflow-executor
  apiGroup: rbac.authorization.k8s.io
---
# Same Role in the 'insight' namespace — workflows (CronWorkflows
# shipped by the umbrella) can execute there as well.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-workflow-executor
  namespace: insight
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["workflowtaskresults"]
    verbs: ["create", "patch", "get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "watch", "patch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-workflow-executor
  namespace: insight
subjects:
  - kind: ServiceAccount
    name: default
    namespace: insight
roleRef:
  kind: Role
  name: argo-workflow-executor
  apiGroup: rbac.authorization.k8s.io
