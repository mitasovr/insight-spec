##
## Argo Workflows — curated values for Insight.
##
## Applied to the argo/argo-workflows chart.
## Installed as a standalone Helm release in namespace 'argo'
## (separate release like Airbyte, for the same lifecycle reasons).
##
## Insight services submit Workflow/CronWorkflow objects in the 'insight'
## namespace, using the WorkflowTemplates shipped by the umbrella chart,
## or call the Argo server API directly.
##

server:
  # Production: --auth-mode=client (Bearer token).
  # Eval/demo: --auth-mode=server (no auth, port-forward friendly).
  extraArgs:
    - "--auth-mode=client"
  serviceType: ClusterIP
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 256Mi }

controller:
  # Namespaces that the controller watches for Workflow resources.
  # 'argo'    — for system workflows.
  # 'insight' — so the umbrella can create CronWorkflow in its own namespace
  #             and the controller picks them up.
  workflowNamespaces:
    - argo
    - insight
  resources:
    requests: { cpu: 200m, memory: 256Mi }
    limits:   { cpu: "1",  memory: 512Mi }

# ServiceAccount used by the workflow steps.
# Created in each allowed namespace; extra RBAC is applied separately
# by install-argo.sh (apply rbac.yaml).
workflow:
  serviceAccount:
    create: true
    name: argo-workflow

executor:
  resources:
    requests: { cpu: 50m,  memory: 64Mi }
    limits:   { cpu: 250m, memory: 128Mi }

# Artifact repository: for storing logs/artifacts between steps.
# Disabled by default — Insight's workflows are short and pass data
# through ClickHouse/MariaDB rather than step-to-step artifacts.
# Enable if you introduce long chains with intermediate files.
useDefaultArtifactRepo: false
