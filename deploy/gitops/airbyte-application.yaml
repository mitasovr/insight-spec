##
## ArgoCD Application: Airbyte
##
## Sync wave 0 — installed FIRST, before Insight.
## The Insight Application waits until this one becomes Healthy.
##
## Values are inlined for simplicity. To keep values in Git, use
## `source.helm.valueFiles` pointing at a file in the repo.
##
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: airbyte
  namespace: argocd
  annotations:
    # Lower wave runs earlier. Insight = wave 1.
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    # On Application deletion, cascade-delete the created resources.
    # Remove this if you don't want that behavior.
    - resources-finalizer.argocd.argoproj.io

spec:
  project: default

  source:
    repoURL: https://airbytehq.github.io/helm-charts
    chart: airbyte
    # Version pin — REQUIRED for reproducible deploys.
    targetRevision: 1.5.1

    helm:
      releaseName: airbyte
      # Values are inlined. For large configs, move them to a separate repo
      # and reference it with multi-source (sources: [helm_chart, values_repo]).
      values: |
        global:
          edition: community
          auth:
            enabled: false
          storage:
            type: minio
          database:
            type: internal
        postgresql:
          enabled: true
        minio:
          enabled: true
        keycloak:
          enabled: false
        keycloak-setup:
          enabled: false
        server:
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: "1",  memory: 1Gi }
        webapp:
          resources:
            requests: { cpu: 50m,  memory: 128Mi }
            limits:   { cpu: 500m, memory: 512Mi }
          ingress:
            enabled: false
        worker:
          resources:
            requests: { cpu: 200m, memory: 512Mi }
            limits:   { cpu: "2",  memory: 2Gi }

  destination:
    server: https://kubernetes.default.svc
    namespace: airbyte

  syncPolicy:
    automated:
      prune: true           # delete resources that are no longer in Git
      selfHeal: true        # auto-sync on drift in the cluster
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m

  # The Airbyte chart creates many resources, including heavy Temporal CRDs.
  # Ignore fields that helm/kubectl patches would flip back and forth.
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
