##
## ArgoCD Application: Insight umbrella
##
## Sync wave 1 — deployed AFTER Airbyte/Argo (wave 0).
## ArgoCD waits for the previous wave to become Healthy first.
##
## Version pin: `targetRevision` is the SINGLE upgrade knob for Insight.
## Bumping the product version = a PR that changes one line here.
##
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: insight
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io

spec:
  project: default

  source:
    # Chart is published to an OCI registry (see the release pipeline).
    # For dev / self-hosted: replace with a Git repo + `path: charts/insight`.
    repoURL: ghcr.io/cyberfabric/charts
    chart: insight
    targetRevision: 0.1.0

    helm:
      releaseName: insight

      # Values are inlined. For larger customers, maintain these in their
      # own config repo and wire them up with multi-source (see README).
      values: |
        # ────────────────────────────────────────────────────────
        # Integration with Airbyte installed as a separate Application
        # ────────────────────────────────────────────────────────
        airbyte:
          apiUrl: "http://airbyte-airbyte-server-svc.airbyte.svc.cluster.local:8001"
          # The JWT signature secret must be mirrored into the insight namespace.
          # Implement via:
          #   - Reflector (https://github.com/emberstack/kubernetes-reflector), or
          #   - External Secrets Operator with source = Airbyte namespace, or
          #   - Manual kubectl post-install step
          jwtSecret:
            name: airbyte-auth-secrets
            key: jwt-signature-secret

        # ────────────────────────────────────────────────────────
        # Infrastructure
        # ────────────────────────────────────────────────────────
        clickhouse:
          enabled: true
          persistence:
            size: 20Gi
          resources:
            requests: { cpu: 500m, memory: 1Gi }
            limits:   { cpu: "4",  memory: 8Gi }

        mariadb:
          enabled: true
          primary:
            persistence:
              size: 10Gi

        redis:
          enabled: true

        redpanda:
          enabled: true
          statefulset:
            replicas: 1

        # ────────────────────────────────────────────────────────
        # Application services
        # ────────────────────────────────────────────────────────
        apiGateway:
          enabled: true
          replicaCount: 2
          authDisabled: false
          oidc:
            # In prod, create a Secret with the issuer/clientId/audience/redirectUri fields:
            existingSecret: insight-oidc
          ingress:
            enabled: true
            className: nginx
            host: insight.example.com
            tls:
              enabled: true
              secretName: insight-tls

        analyticsApi:
          enabled: true
          replicaCount: 2
          clickhouse:
            credentialsSecret:
              name: insight-clickhouse-creds

        identity:
          enabled: false

        frontend:
          enabled: true
          replicaCount: 1
          oidc:
            # Must match the public part of apiGateway.oidc.clientId.
            clientId: insight-frontend
          ingress:
            enabled: true
            className: nginx
            host: app.insight.example.com

  destination:
    server: https://kubernetes.default.svc
    namespace: insight

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
